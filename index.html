document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nset-800:    #D85A33;\n  --autumn-sunset-700:    #F7774D;   /* base */\n  --autumn-sunset-600:    #F88B68;\n  --autumn-sunset-500:    #F9A083;\n  --autumn-sunset-400:    #FBB7A2;\n  --autumn-sunset-300:    #FCCEC1;\n  --autumn-sunset-200:    #FDE2D9;\n  --autumn-sunset-100:    #FEF1EC;\n  --autumn-sunset-50:     #FFF8F5;\n\n  /* Orange Beige — warm neutral / off-white surface */\n  --orange-beige:         #F7F2EF;\n  /* Pure White */\n  --pure-white:           #FFFFFF;\n\n  /* Neutrals — derived from Majolica desaturation, warm-leaning */\n  --ink-900:              #0F1A21;\n  --ink-800:              #1A2A35;\n  --ink-700:              #2C3A44;\n  --ink-600:              #475560;\n  --ink-500:              #6B7882;\n  --ink-400:              #8E99A2;\n  --ink-300:              #B5BDC4;\n  --ink-200:              #D6DBDF;\n  --ink-100:              #EAEDEF;\n  --ink-50:               #F4F6F7;\n\n  /* Semantic status (used sparingly; derived to harmonize) */\n  --success:              #3F8F6E;\n  --success-bg:           #E7F2EC;\n  --warning:              #D89A2C;\n  --warning-bg:           #FBF1DC;\n  --danger:               #C5523A;\n  --danger-bg:            #FBE7E1;\n  --info:                 #3A6679;     /* majolica-500 */\n  --info-bg:              #DCE5EA;\n\n  /* ------------------------------------------------------------------\n     COLOR — semantic tokens\n     ------------------------------------------------------------------ */\n  --bg:                   var(--orange-beige);  /* default page background */\n  --bg-elevated:          var(--pure-white);    /* cards, modals */\n  --bg-inverse:           var(--majolica-blue);\n  --bg-subtle:            #FAF6F3;\n  --bg-tinted:            var(--autumn-sunset-100);\n\n  --fg-1:                 var(--majolica-blue); /* primary text */\n  --fg-2:                 var(--ink-700);       /* body text */\n  --fg-3:                 var(--ink-500);       /* muted, meta */\n  --fg-4:                 var(--ink-400);       /* placeholder */\n  --fg-on-dark:           var(--orange-beige);\n  --fg-on-accent:         var(--pure-white);\n  --fg-accent:            var(--autumn-sunset);\n  --fg-link:              var(--autumn-sunset-800);\n\n  --border:               #E3DCD6;              /* warm hairline */\n  --border-strong:        #C9C0B8;\n  --border-on-dark:       rgba(247,242,239,0.16);\n  --divider:              #ECE4DD;\n\n  /* ------------------------------------------------------------------\n     TYPOGRAPHY — families\n     ------------------------------------------------------------------ */\n  --font-sans: 'Alexandria', 'Segoe UI', system-ui, -apple-system, sans-serif;\n  --font-display: 'Alexandria', 'Segoe UI', system-ui, sans-serif;\n  --font-arabic: 'Alexandria', 'Tajawal', 'Cairo', system-ui, sans-serif;\n  --font-mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;\n\n  /* Type scale — tuned for bilingual Arabic/Latin readability */\n  --fs-display-xl: 72px;\n  --fs-display-lg: 56px;\n  --fs-display:    44px;\n  --fs-h1:         36px;\n  --fs-h2:         28px;\n  --fs-h3:         22px;\n  --fs-h4:         18px;\n  --fs-body-lg:    18px;\n  --fs-body:       16px;\n  --fs-body-sm:    14px;\n  --fs-caption:    13px;\n  --fs-overline:   12px;\n\n  /* Weights — Alexandria offers 300–800 */\n  --fw-light:      300;\n  --fw-regular:    400;\n  --fw-medium:     500;\n  --fw-semibold:   600;\n  --fw-bold:       700;\n  --fw-extrabold:  800;\n\n  /* Line heights */\n  --lh-tight:      1.1;\n  --lh-snug:       1.25;\n  --lh-normal:     1.5;\n  --lh-loose:      1.7;\n\n  /* Tracking */\n  --ls-tight:      -0.02em;\n  --ls-normal:     0;\n  --ls-wide:       0.02em;\n  --ls-overline:   0.12em;\n\n  /* ------------------------------------------------------------------\n     SPACING (4px base)\n     ------------------------------------------------------------------ */\n  --sp-0:   0;\n  --sp-1:   4px;\n  --sp-2:   8px;\n  --sp-3:   12px;\n  --sp-4:   16px;\n  --sp-5:   20px;\n  --sp-6:   24px;\n  --sp-7:   32px;\n  --sp-8:   40px;\n  --sp-9:   48px;\n  --sp-10:  64px;\n  --sp-11:  80px;\n  --sp-12:  120px;\n\n  /* ------------------------------------------------------------------\n     RADII — confident, geometric (matches DA mark's clean angles)\n     ------------------------------------------------------------------ */\n  --r-none:  0;\n  --r-xs:    2px;\n  --r-sm:    4px;\n  --r-md:    8px;\n  --r-lg:    12px;\n  --r-xl:    16px;\n  --r-2xl:   24px;\n  --r-pill:  9999px;\n\n  /* ------------------------------------------------------------------\n     SHADOWS — soft, warm-tinted (no harsh blue-grays)\n     ------------------------------------------------------------------ */\n  --shadow-xs:  0 1px 2px rgba(33, 59, 74, 0.06);\n  --shadow-sm:  0 2px 6px rgba(33, 59, 74, 0.07);\n  --shadow-md:  0 6px 18px rgba(33, 59, 74, 0.08);\n  --shadow-lg:  0 16px 36px rgba(33, 59, 74, 0.10);\n  --shadow-xl:  0 28px 60px rgba(33, 59, 74, 0.14);\n  --shadow-inset: inset 0 1px 0 rgba(255,255,255,0.6);\n  --shadow-accent: 0 10px 28px rgba(247, 119, 77, 0.28);\n\n  /* ------------------------------------------------------------------\n     MOTION\n     ------------------------------------------------------------------ */\n  --ease-standard: cubic-bezier(0.2, 0.7, 0.2, 1);\n  --ease-emphasized: cubic-bezier(0.32, 0.72, 0.22, 1);\n  --dur-fast:    140ms;\n  --dur-base:    220ms;\n  --dur-slow:    360ms;\n}\n\n/* =====================================================================\n   SEMANTIC ELEMENT STYLES\n   ===================================================================== */\n\nhtml { color-scheme: light; }\nbody {\n  font-family: var(--font-sans);\n  font-size: var(--fs-body);\n  line-height: var(--lh-normal);\n  color: var(--fg-1);\n  background: var(--bg);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* RTL support */\n[dir=\"rtl\"] body, [lang=\"ar\"] {\n  font-family: var(--font-arabic);\n}\n\n/* Display headings — Alexandria semibold, tight */\n.display-xl, .display-lg, .display,\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-display);\n  color: var(--fg-1);\n  letter-spacing: var(--ls-tight);\n  line-height: var(--lh-tight);\n  margin: 0 0 var(--sp-4);\n  text-wrap: balance;\n}\n\n.display-xl { font-size: var(--fs-display-xl); font-weight: var(--fw-bold); }\n.display-lg { font-size: var(--fs-display-lg); font-weight: var(--fw-bold); }\n.display    { font-size: var(--fs-display);    font-weight: var(--fw-semibold); }\n\nh1 { font-size: var(--fs-h1); font-weight: var(--fw-bold); }\nh2 { font-size: var(--fs-h2); font-weight: var(--fw-semibold); }\nh3 { font-size: var(--fs-h3); font-weight: var(--fw-semibold); }\nh4 { font-size: var(--fs-h4); font-weight: var(--fw-semibold); letter-spacing: var(--ls-normal); }\n\np {\n  font-size: var(--fs-body);\n  line-height: var(--lh-loose);\n  color: var(--fg-2);\n  margin: 0 0 var(--sp-4);\n  text-wrap: pretty;\n}\n\nsmall, .caption {\n  font-size: var(--fs-caption);\n  color: var(--fg-3);\n}\n\n.overline {\n  font-size: var(--fs-overline);\n  font-weight: var(--fw-semibold);\n  letter-spacing: var(--ls-overline);\n  text-transform: uppercase;\n  color: var(--autumn-sunset-800);\n}\n\na {\n  color: var(--fg-link);\n  text-decoration: none;\n  border-bottom: 1px solid transparent;\n  transition: border-color var(--dur-fast) var(--ease-standard),\n              color var(--dur-fast) var(--ease-standard);\n}\na:hover { border-bottom-color: currentColor; }\n\ncode, pre, kbd {\n  font-family: var(--font-mono);\n  font-size: 0.92em;\n}\n\nhr {\n  border: 0;\n  border-top: 1px solid var(--divider);\n  margin: var(--sp-7) 0;\n}\n\n::selection {\n  background: var(--autumn-sunset-200);\n  color: var(--majolica-blue-900);\n}\n<\u002Fstyle>\n\n<style>\n  /* ---------------------------------------------------------------\n     RESET + page shell\n     --------------------------------------------------------------- */\n  *, *::before, *::after { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  html { scroll-behavior: smooth; }\n  body {\n    min-height: 100vh;\n    min-height: 100svh;\n    background: var(--bg);\n    color: var(--fg-1);\n    /* tabular numerals for phone numbers etc */\n    font-feature-settings: \"ss01\", \"tnum\";\n    overflow-x: hidden;\n  }\n  img { display: block; max-width: 100%; }\n  button { font: inherit; color: inherit; cursor: pointer; }\n  a { color: inherit; }\n\n  /* Quiet-luxury background: warm beige with the faintest blue-tinted\n     vignette + a soft accent glow at the top.\n     Decorative — no motif. */\n  .page-bg {\n    position: fixed; inset: 0; z-index: -1; pointer-events: none;\n    background:\n      radial-gradient(80% 50% at 50% -10%,\n        rgba(247, 119, 77, 0.10) 0%,\n        rgba(247, 119, 77, 0)   60%),\n      radial-gradient(100% 70% at 50% 120%,\n        rgba(33, 59, 74, 0.06) 0%,\n        rgba(33, 59, 74, 0) 60%),\n      var(--bg);\n  }\n\n  /* ---------------------------------------------------------------\n     LAYOUT\n     --------------------------------------------------------------- */\n  .shell {\n    width: 100%;\n    max-width: 460px;\n    margin: 0 auto;\n    padding:\n      max(20px, env(safe-area-inset-top))\n      20px\n      max(40px, env(safe-area-inset-bottom));\n    display: flex;\n    flex-direction: column;\n    gap: var(--sp-7);\n  }\n\n  /* ---------------------------------------------------------------\n     TOP BAR — theme toggle (left) + language toggle (right)\n     --------------------------------------------------------------- */\n  .topbar {\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    height: 36px;\n    gap: var(--sp-3);\n    /* Force LTR layout so theme-toggle stays physically on the left\n       and the language toggle on the right — in both RTL and LTR pages */\n    direction: ltr;\n  }\n  /* Theme toggle is a small circular icon button */\n  .theme-toggle {\n    appearance: none;\n    width: 34px; height: 34px;\n    border-radius: var(--r-pill);\n    background: var(--bg-elevated);\n    border: 1px solid var(--border);\n    color: var(--fg-1);\n    display: inline-flex;\n    align-items: center;\n    justify-content: center;\n    box-shadow: var(--shadow-xs);\n    transition: background var(--dur-fast) var(--ease-standard),\n                color var(--dur-fast) var(--ease-standard),\n                transform var(--dur-base) var(--ease-emphasized),\n                border-color var(--dur-fast) var(--ease-standard);\n  }\n  .theme-toggle:hover {\n    transform: translateY(-1px);\n    border-color: var(--autumn-sunset-300);\n    color: var(--autumn-sunset-800);\n  }\n  .theme-toggle:focus-visible { outline: 2px solid var(--autumn-sunset); outline-offset: 2px; }\n  .theme-toggle svg { width: 16px; height: 16px; transition: opacity var(--dur-fast); }\n  .theme-toggle .ic-moon { display: none; }\n  .theme-toggle .ic-sun  { display: block; }\n  body.is-dark .theme-toggle .ic-moon { display: block; }\n  body.is-dark .theme-toggle .ic-sun  { display: none; }\n\n  .lang-toggle {\n    display: inline-flex;\n    align-items: center;\n    gap: 4px;\n    background: var(--bg-elevated);\n    border: 1px solid var(--border);\n    border-radius: var(--r-pill);\n    padding: 4px;\n    box-shadow: var(--shadow-xs);\n  }\n  .lang-toggle button {\n    appearance: none; border: 0; background: transparent;\n    font-family: var(--font-sans);\n    font-size: 12px;\n    font-weight: var(--fw-semibold);\n    letter-spacing: 0.04em;\n    color: var(--fg-3);\n    padding: 6px 12px;\n    border-radius: var(--r-pill);\n    transition: all var(--dur-fast) var(--ease-standard);\n    line-height: 1;\n  }\n  .lang-toggle button.is-active {\n    background: var(--majolica-blue);\n    color: var(--fg-on-dark);\n  }\n  .lang-toggle button:not(.is-active):hover { color: var(--fg-1); }\n\n  /* ---------------------------------------------------------------\n     BRAND HEADER\n     --------------------------------------------------------------- */\n  .brand {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    text-align: center;\n    gap: var(--sp-5);\n    padding-top: var(--sp-3);\n  }\n\n  .brand-logo {\n    width: 132px;\n    height: auto;\n    filter: drop-shadow(0 4px 14px rgba(33, 59, 74, 0.10));\n    animation: logoIn 700ms var(--ease-emphasized) both;\n  }\n\n  .brand-name {\n    font-size: 26px;\n    font-weight: var(--fw-bold);\n    letter-spacing: var(--ls-tight);\n    color: var(--majolica-blue);\n    margin: 0;\n    line-height: 1.15;\n  }\n  /* Latin name appears slightly smaller as a secondary mark */\n  [data-lang=\"en\"] .brand-name { font-size: 24px; }\n\n  .brand-rule {\n    width: 28px; height: 2px;\n    background: var(--autumn-sunset);\n    border-radius: 2px;\n    margin: 2px 0;\n  }\n\n  .brand-tagline {\n    margin: 0;\n    color: var(--fg-2);\n    font-size: 14px;\n    line-height: var(--lh-loose);\n    max-width: 30ch;\n    font-weight: var(--fw-regular);\n  }\n\n  .brand-overline {\n    font-size: 10.5px;\n    font-weight: var(--fw-semibold);\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--autumn-sunset-800);\n    margin: 0;\n  }\n\n  /* ---------------------------------------------------------------\n     SECTIONS\n     --------------------------------------------------------------- */\n  .section { display: flex; flex-direction: column; gap: var(--sp-3); }\n\n  .section-label {\n    font-size: 10.5px;\n    font-weight: var(--fw-semibold);\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--fg-3);\n    margin: 0 var(--sp-1);\n    display: flex;\n    align-items: center;\n    gap: 10px;\n  }\n  .section-label::after {\n    content: \"\";\n    flex: 1;\n    height: 1px;\n    background: var(--divider);\n  }\n\n  /* ---------------------------------------------------------------\n     SOCIAL ICONS\n     --------------------------------------------------------------- */\n  .socials {\n    display: flex;\n    flex-wrap: wrap;\n    justify-content: center;\n    gap: 10px;\n  }\n  .social {\n    width: 42px; height: 42px;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    background: var(--bg-elevated);\n    border: 1px solid var(--border);\n    border-radius: var(--r-pill);\n    color: var(--majolica-blue);\n    box-shadow: var(--shadow-xs);\n    transition: transform var(--dur-base) var(--ease-emphasized),\n                box-shadow var(--dur-base) var(--ease-emphasized),\n                border-color var(--dur-base) var(--ease-standard),\n                color var(--dur-base) var(--ease-standard),\n                background var(--dur-base) var(--ease-standard);\n    text-decoration: none;\n    border-bottom: 1px solid var(--border);\n  }\n  .social svg { width: 18px; height: 18px; transition: transform var(--dur-base) var(--ease-emphasized); }\n  .social:hover {\n    transform: translateY(-2px);\n    box-shadow: var(--shadow-md);\n    border-color: var(--autumn-sunset-300);\n    color: var(--autumn-sunset-800);\n  }\n  .social:active { transform: translateY(0); }\n  .social:hover svg { transform: scale(1.08); }\n  .social:focus-visible {\n    outline: 2px solid var(--autumn-sunset);\n    outline-offset: 3px;\n  }\n\n  /* ---------------------------------------------------------------\n     LINK ROWS  (contact info, address, etc)\n     --------------------------------------------------------------- */\n  .link-card {\n    background: var(--bg-elevated);\n    border: 1px solid var(--border);\n    border-radius: var(--r-xl);\n    box-shadow: var(--shadow-xs);\n    overflow: hidden;\n  }\n  .link-row {\n    display: flex;\n    align-items: center;\n    gap: var(--sp-4);\n    padding: 14px 16px;\n    text-decoration: none;\n    color: var(--fg-1);\n    border-bottom: 1px solid var(--divider);\n    transition: background var(--dur-fast) var(--ease-standard);\n    min-height: 60px;\n  }\n  .link-row:last-child { border-bottom: 0; }\n  .link-row:hover { background: var(--bg-subtle); }\n  .link-row:active { background: var(--ink-100); }\n\n  .link-icon {\n    flex: 0 0 36px;\n    width: 36px; height: 36px;\n    border-radius: var(--r-md);\n    background: var(--majolica-blue-50);\n    color: var(--majolica-blue);\n    display: flex; align-items: center; justify-content: center;\n  }\n  .link-icon svg { width: 18px; height: 18px; }\n\n  .link-body {\n    flex: 1;\n    display: flex;\n    flex-direction: column;\n    gap: 2px;\n    min-width: 0;\n  }\n  .link-label {\n    font-size: 11px;\n    font-weight: var(--fw-semibold);\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--fg-3);\n    line-height: 1.2;\n  }\n  .link-value {\n    font-size: 15px;\n    font-weight: var(--fw-medium);\n    color: var(--fg-1);\n    line-height: 1.35;\n    overflow: hidden;\n    text-overflow: ellipsis;\n    word-break: break-word;\n  }\n  /* tabular numerals for phone digits - rendered LTR even in RTL */\n  .num {\n    direction: ltr;\n    unicode-bidi: isolate;\n    font-variant-numeric: tabular-nums;\n    display: inline-block;\n  }\n\n  .link-chev {\n    color: var(--fg-4);\n    flex: 0 0 auto;\n    transition: transform var(--dur-base) var(--ease-emphasized),\n                color var(--dur-base) var(--ease-standard);\n  }\n  .link-chev svg { width: 16px; height: 16px; display: block; }\n  /* Chevron points away from the page edge (toward the start of reading direction's tail) */\n  [dir=\"rtl\"] .link-chev { transform: scaleX(-1); }\n  .link-row:hover .link-chev {\n    color: var(--autumn-sunset-800);\n    transform: translateX(-3px);\n  }\n  [dir=\"rtl\"] .link-row:hover .link-chev {\n    transform: scaleX(-1) translateX(-3px);\n  }\n\n  /* The address row gets a special two-line layout */\n  .link-row--address { align-items: flex-start; padding-top: 16px; padding-bottom: 16px; }\n  .link-row--address .link-value {\n    font-size: 14px;\n    line-height: 1.55;\n    font-weight: var(--fw-regular);\n    color: var(--fg-2);\n  }\n\n  /* ---------------------------------------------------------------\n     PERSONAL CONTACT CARD — the hero \"tap to save\" moment\n     --------------------------------------------------------------- */\n  .person-card {\n    position: relative;\n    background:\n      radial-gradient(120% 80% at 100% 0%, rgba(247,119,77,0.10) 0%, rgba(247,119,77,0) 55%),\n      linear-gradient(180deg, var(--majolica-blue-800) 0%, var(--majolica-blue) 100%);\n    color: var(--fg-on-dark);\n    border-radius: var(--r-2xl);\n    padding: 20px 18px 18px;\n    box-shadow: var(--shadow-lg);\n    overflow: hidden;\n    isolation: isolate;\n  }\n  /* faint DA mark watermark in the corner */\n  .person-card::before {\n    content: \"\";\n    position: absolute;\n    inset-inline-end: -16px;\n    top: -16px;\n    width: 130px; height: 130px;\n    background-image: url(\"a6411957-4d0f-4c3b-9d06-fe6649116062\");\n    background-size: contain;\n    background-repeat: no-repeat;\n    background-position: center;\n    opacity: 0.08;\n    z-index: 0;\n    pointer-events: none;\n  }\n  .person-card > * { position: relative; z-index: 1; }\n\n  .person-head {\n    display: flex;\n    align-items: center;\n    gap: 12px;\n    margin-bottom: 14px;\n  }\n  .person-avatar {\n    flex: 0 0 48px;\n    width: 48px; height: 48px;\n    border-radius: var(--r-pill);\n    background: var(--orange-beige);\n    color: var(--majolica-blue);\n    display: flex; align-items: center; justify-content: center;\n    font-family: var(--font-display);\n    font-weight: var(--fw-bold);\n    font-size: 18px;\n    letter-spacing: -0.01em;\n    box-shadow: inset 0 0 0 2px rgba(247, 119, 77, 0.55);\n  }\n  .person-meta {\n    display: flex;\n    flex-direction: column;\n    gap: 2px;\n    min-width: 0;\n  }\n  .person-tag {\n    font-size: 10px;\n    font-weight: var(--fw-semibold);\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--autumn-sunset-300);\n    line-height: 1;\n    margin-bottom: 3px;\n  }\n  .person-name {\n    font-size: 18px;\n    font-weight: var(--fw-bold);\n    line-height: 1.2;\n    letter-spacing: -0.01em;\n    color: var(--orange-beige);\n  }\n  .person-role {\n    font-size: 12.5px;\n    font-weight: var(--fw-regular);\n    color: rgba(247,242,239,0.72);\n    line-height: 1.3;\n  }\n\n  .person-divider {\n    height: 1px;\n    background: var(--border-on-dark);\n    margin: 0 -18px 14px;\n  }\n\n  .person-fields {\n    display: flex;\n    flex-direction: column;\n    gap: 8px;\n    margin-bottom: 16px;\n  }\n  .person-field {\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    font-size: 13px;\n    color: rgba(247,242,239,0.86);\n    text-decoration: none;\n  }\n  .person-field svg {\n    flex: 0 0 16px;\n    width: 16px; height: 16px;\n    color: var(--autumn-sunset);\n    opacity: 0.9;\n  }\n  .person-field span { word-break: break-word; }\n\n  .save-btn {\n    appearance: none;\n    width: 100%;\n    border: 0;\n    background: var(--autumn-sunset);\n    color: #fff;\n    font-family: var(--font-sans);\n    font-weight: var(--fw-semibold);\n    font-size: 14.5px;\n    letter-spacing: 0.01em;\n    border-radius: var(--r-lg);\n    padding: 13px 18px;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    gap: 10px;\n    box-shadow: var(--shadow-accent);\n    transition: transform var(--dur-base) var(--ease-emphasized),\n                box-shadow var(--dur-base) var(--ease-emphasized),\n                background var(--dur-fast) var(--ease-standard);\n    position: relative;\n    overflow: hidden;\n  }\n  .save-btn:hover {\n    transform: translateY(-1px);\n    background: var(--autumn-sunset-600);\n    box-shadow: 0 14px 32px rgba(247, 119, 77, 0.36);\n  }\n  .save-btn:active { transform: translateY(0); }\n  .save-btn:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }\n  .save-btn svg { width: 18px; height: 18px; }\n\n  /* When download fires, briefly flip to a \"saved\" state */\n  .save-btn.is-saved {\n    background: var(--success);\n    box-shadow: 0 10px 28px rgba(63, 143, 110, 0.35);\n  }\n  .save-btn .ic-saved { display: none; }\n  .save-btn.is-saved .ic-default { display: none; }\n  .save-btn.is-saved .ic-saved { display: inline-block; }\n\n  /* ---------------------------------------------------------------\n     FOOTER\n     --------------------------------------------------------------- */\n  .footer {\n    text-align: center;\n    color: var(--fg-3);\n    font-size: 11px;\n    letter-spacing: 0.04em;\n    line-height: 1.6;\n    padding: 6px 0 0;\n  }\n  .footer .reg {\n    direction: ltr;\n    unicode-bidi: isolate;\n    font-variant-numeric: tabular-nums;\n    color: var(--fg-3);\n  }\n  .footer-mark {\n    display: inline-flex;\n    align-items: center;\n    gap: 6px;\n    margin-bottom: 6px;\n    color: var(--fg-2);\n  }\n  .footer-mark .dot {\n    width: 4px; height: 4px;\n    background: var(--autumn-sunset);\n    border-radius: 50%;\n  }\n\n  /* ---------------------------------------------------------------\n     TOAST — confirmation when contact saves\n     --------------------------------------------------------------- */\n  .toast {\n    position: fixed;\n    left: 50%;\n    bottom: max(24px, env(safe-area-inset-bottom));\n    transform: translate(-50%, 24px);\n    background: var(--majolica-blue-900);\n    color: var(--orange-beige);\n    padding: 12px 18px;\n    border-radius: var(--r-pill);\n    font-size: 13px;\n    font-weight: var(--fw-medium);\n    box-shadow: var(--shadow-lg);\n    display: flex;\n    align-items: center;\n    gap: 8px;\n    opacity: 0;\n    pointer-events: none;\n    transition: opacity 220ms var(--ease-standard),\n                transform 280ms var(--ease-emphasized);\n    z-index: 100;\n  }\n  .toast.is-visible {\n    opacity: 1;\n    transform: translate(-50%, 0);\n  }\n  .toast svg { width: 16px; height: 16px; color: var(--autumn-sunset); }\n\n  /* ---------------------------------------------------------------\n     DARK MODE\n     --------------------------------------------------------------- */\n  body.is-dark {\n    --bg:           #0F1A21;\n    --bg-elevated:  #1A2A35;\n    --bg-subtle:    #213B4A;\n    --bg-tinted:    #2A1F1A;\n    --fg-1:         #F4F0EC;\n    --fg-2:         #C9CDD1;\n    --fg-3:         #8E99A2;\n    --fg-4:         #6B7882;\n    --border:       rgba(247, 242, 239, 0.10);\n    --border-strong:rgba(247, 242, 239, 0.18);\n    --divider:      rgba(247, 242, 239, 0.08);\n    --shadow-xs:    0 1px 2px rgba(0,0,0,0.35);\n    --shadow-sm:    0 2px 6px rgba(0,0,0,0.40);\n    --shadow-md:    0 6px 18px rgba(0,0,0,0.45);\n    --shadow-lg:    0 16px 36px rgba(0,0,0,0.55);\n    color-scheme: dark;\n  }\n  body.is-dark .page-bg {\n    background:\n      radial-gradient(80% 50% at 50% -10%, rgba(247,119,77,0.14) 0%, rgba(247,119,77,0) 60%),\n      radial-gradient(100% 70% at 50% 120%, rgba(33,59,74,0.50) 0%, rgba(33,59,74,0) 60%),\n      var(--bg);\n  }\n  body.is-dark .brand-name { color: #F4F0EC; }\n  body.is-dark .link-icon  { background: rgba(247,119,77,0.14); color: var(--autumn-sunset); }\n  body.is-dark .link-value { color: var(--fg-1); }\n  body.is-dark .social {\n    color: var(--orange-beige);\n    background: var(--bg-elevated);\n  }\n  body.is-dark .social:hover {\n    color: var(--autumn-sunset);\n    border-color: rgba(247, 119, 77, 0.45);\n  }\n  body.is-dark .theme-toggle {\n    background: var(--bg-elevated);\n    color: var(--orange-beige);\n  }\n  body.is-dark .theme-toggle:hover { color: var(--autumn-sunset); }\n  body.is-dark .lang-toggle {\n    background: var(--bg-elevated);\n  }\n  body.is-dark .lang-toggle button.is-active {\n    background: var(--autumn-sunset);\n    color: #fff;\n  }\n  body.is-dark .link-row { color: var(--fg-1); }\n  body.is-dark .link-row:hover { background: rgba(247, 242, 239, 0.04); }\n  body.is-dark .link-row:active { background: rgba(247, 242, 239, 0.07); }\n  body.is-dark .person-card {\n    background:\n      radial-gradient(120% 80% at 100% 0%, rgba(247,119,77,0.16) 0%, rgba(247,119,77,0) 55%),\n      linear-gradient(180deg, #16242E 0%, #0E1820 100%);\n    box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(247,242,239,0.06);\n  }\n  body.is-dark .toast { background: #050B0F; }\n  body.is-dark .brand-logo { filter: drop-shadow(0 4px 14px rgba(0,0,0,0.5)); }\n\n  /* ---------------------------------------------------------------\n     ENTRANCE ANIMATIONS — gentle stagger\n     --------------------------------------------------------------- */\n  @keyframes logoIn {\n    from { opacity: 0; transform: translateY(-6px) scale(0.96); }\n    to   { opacity: 1; transform: none; }\n  }\n  @keyframes fadeUp {\n    from { opacity: 0; transform: translateY(8px); }\n    to   { opacity: 1; transform: none; }\n  }\n  @media (prefers-reduced-motion: no-preference) {\n    .stagger > * {\n      opacity: 0;\n      animation: fadeUp 540ms var(--ease-emphasized) forwards;\n    }\n    .stagger > *:nth-child(1) { animation-delay: 80ms; }\n    .stagger > *:nth-child(2) { animation-delay: 160ms; }\n    .stagger > *:nth-child(3) { animation-delay: 240ms; }\n    .stagger > *:nth-child(4) { animation-delay: 320ms; }\n    .stagger > *:nth-child(5) { animation-delay: 400ms; }\n    .stagger > *:nth-child(6) { animation-delay: 480ms; }\n  }\n\n  @media (prefers-reduced-motion: reduce) {\n    *, *::before, *::after {\n      animation-duration: 0.01ms !important;\n      animation-delay: 0 !important;\n      transition-duration: 0.01ms !important;\n    }\n  }\n\n  /* ---------------------------------------------------------------\n     LANGUAGE VISIBILITY — show only the active language\n     --------------------------------------------------------------- */\n  [data-lang=\"ar\"] .en-only { display: none !important; }\n  [data-lang=\"en\"] .ar-only { display: none !important; }\n\n  /* In English mode, force the Latin font even on body (RTL still\n     uses Arabic font for any AR-only nodes) */\n  [data-lang=\"en\"] body { font-family: var(--font-sans); }\n\n  /* Wider screens — keep the column tight, but lift it a bit */\n  @media (min-width: 720px) {\n    .shell { padding-top: 48px; gap: var(--sp-8); }\n    .brand-logo { width: 148px; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  \n  <div class=\"page-bg\" aria-hidden=\"true\"><\u002Fdiv>\n\n  <main class=\"shell\" id=\"shell\">\n\n    <!-- TOP BAR -->\n    <div class=\"topbar\">\n      <button type=\"button\" class=\"theme-toggle\" id=\"themeToggle\" aria-label=\"Toggle theme\" aria-pressed=\"false\">\n        <svg class=\"ic-sun\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\">\n          <circle cx=\"12\" cy=\"12\" r=\"4\"><\u002Fcircle>\n          <path d=\"M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41\"><\u002Fpath>\n        <\u002Fsvg>\n        <svg class=\"ic-moon\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\">\n          <path d=\"M21 12.8A8.5 8.5 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fbutton>\n      <div class=\"lang-toggle\" role=\"group\" aria-label=\"Language\">\n        <button type=\"button\" data-lang-set=\"ar\" class=\"is-active\" aria-pressed=\"true\">عربي<\u002Fbutton>\n        <button type=\"button\" data-lang-set=\"en\" aria-pressed=\"false\">EN<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- BRAND -->\n    <header class=\"brand\">\n      <img class=\"brand-logo\" src=\"a6411957-4d0f-4c3b-9d06-fe6649116062\" alt=\"الديار العامرة — AlDiyar AlAmirah\" width=\"320\" height=\"200\"> ame=\"theme-color\"]');\n      if (meta) meta.setAttribute('content', dark ? '#0F1A21' : '#213B4A');\n      try { localStorage.setItem('ada_theme', mode); } catch (e) {}\n    }\n    themeBtn.addEventListener('click', () => {\n      setTheme(body.classList.contains('is-dark') ? 'light' : 'dark');\n    });\n    try {\n      const savedTheme = localStorage.getItem('ada_theme');\n      if (savedTheme === 'dark' || savedTheme === 'light') setTheme(savedTheme);\n      else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) setTheme('dark');\n      else setTheme('light');\n    } catch (e) { setTheme('light'); }\n\n    // ---- Language toggle ---------------------------------------------\n    function setLang(lang) {\n      const isAr = lang === 'ar';\n      html.lang = isAr ? 'ar' : 'en';\n      html.dir  = isAr ? 'rtl' : 'ltr';\n      body.dataset.lang = isAr ? 'ar' : 'en';\n      document.querySelectorAll('[data-lang-set]').forEach(btn => {\n        const active = btn.dataset.langSet === lang;\n        btn.classList.toggle('is-active', active);\n        btn.setAttribute('aria-pressed', String(active));\n      });\n      try { localStorage.setItem('ada_lang', lang); } catch (e) {}\n      document.title = isAr\n        ? 'الديار العامرة | AlDiyar AlAmirah'\n        : 'AlDiyar AlAmirah | الديار العامرة';\n    }\n    document.querySelectorAll('[data-lang-set]').forEach(btn => {\n      btn.addEventListener('click', () => setLang(btn.dataset.langSet));\n    });\n    // Init: stored pref → default ar\n    try {\n      const saved = localStorage.getItem('ada_lang');\n      if (saved === 'en') setLang('en');\n      else setLang('ar');\n    } catch (e) { setLang('ar'); }\n\n    // ---- vCard download ----------------------------------------------\n    // Build vCard 3.0 (best compatibility iOS/Android Contacts apps).\n    // Note: phone numbers are written in international format so they\n    // dial correctly when the contact is saved.\n    function buildVCard() {\n      // CRLF line endings as required by RFC 6350\n      const lines = [\n        'BEGIN:VCARD',\n        'VERSION:3.0',\n        'N;CHARSET=UTF-8:Hamidaddin;Dhiaaddin;;;',\n        'FN;CHARSET=UTF-8:Dhiaaddin Hamidaddin',\n        'X-PHONETIC-FIRST-NAME:Dhiaaddin',\n        'X-PHONETIC-LAST-NAME:Hamidaddin',\n        'ORG;CHARSET=UTF-8:AlDiyar AlAmirah Commercial Co.',\n        'TITLE;CHARSET=UTF-8:Designer',\n        'TEL;TYPE=CELL,VOICE:+966540545591',\n        'TEL;TYPE=WORK,VOICE:+966561599947',\n        'EMAIL;TYPE=INTERNET,PREF:d.hamidaddin7@gmail.com',\n        'EMAIL;TYPE=INTERNET,WORK:Info@diyaralamirah.com',\n        // Address: PO box; extended; street; city; region; postal code; country\n        'ADR;TYPE=WORK;CHARSET=UTF-8:;;Al Dhahab St., Ba\\'ashan Bldg., Office 105;Jeddah;Makkah;;Saudi Arabia',\n        'NOTE;CHARSET=UTF-8:Historic Jeddah - Al Balad',\n        'REV:' + new Date().toISOString().replace(/[-:]/g, '').replace(/\\.\\d{3}/, ''),\n        'END:VCARD'\n      ];\n      return lines.join('\\r\\n');\n    }\n\n    function downloadVCard() {\n      const vcard = buildVCard();\n      // Add BOM so iOS/Android handle UTF-8 correctly\n      const blob = new Blob(['\\ufeff' + vcard], { type: 'text/vcard;charset=utf-8' });\n      const url = URL.createObjectURL(blob);\n      const a = document.createElement('a');\n      a.href = url;\n      a.download = 'Dhiaaddin-Hamidaddin.vcf';\n      // Some iOS versions ignore download attr; opening the data: url\n      // would prompt Contacts. Append + click anchor — works on\n      // Android Chrome, iOS Safari treats as download then prompts.\n      document.body.appendChild(a);\n      a.click();\n      setTimeout(() => {\n        document.body.removeChild(a);\n        URL.revokeObjectURL(url);\n      }, 1000);\n    }\n\n    const btn = document.getElementById('saveContactBtn');\n    const toast = document.getElementById('toast');\n    let toastTimer;\n    function showToast() {\n      toast.classList.add('is-visible');\n      clearTimeout(toastTimer);\n      toastTimer = setTimeout(() => toast.classList.remove('is-visible'), 3200);\n    }\n    function flashSavedState() {\n      btn.classList.add('is-saved');\n      btn.querySelectorAll('.btn-default-label').forEach(el => el.hidden = true);\n      btn.querySelectorAll('.btn-saved-label').forEach(el => el.hidden = false);\n      setTimeout(() => {\n        btn.classList.remove('is-saved');\n        btn.querySelectorAll('.btn-default-label').forEach(el => el.hidden = false);\n        btn.querySelectorAll('.btn-saved-label').forEach(el => el.hidden = true);\n      }, 2200);\n    }\n    btn.addEventListener('click', () => {\n      downloadVCard();\n      flashSavedState();\n      showToast();\n    });\n\n    // ---- Stagger animation classes for first-load ----\n    document.getElementById('shell')?.classList.add('stagger');\n  })();\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
